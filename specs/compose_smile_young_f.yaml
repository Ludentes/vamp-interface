name: smile_on_young_f_with_age_hold
base: young_european_f
seed: 2026
max_iters: 4

# Primary: v_eur_me smile pair at 0.5 — known to fire visibly on Eur bases
# but in iter_08 ages young_european_f by +5.86 y (ins_age delta anchor→render).
primary:
  label: smile_v_eur_me
  target_readout: siglip_smiling_margin
  pos: "An {age} {ethnicity} {gender} smiling warmly."
  neg: "An {age} Middle Eastern {gender} smiling warmly."
  scale: 0.5

# One confound to correct: age drift.
confounds:
  - name: age_drift
    readout: mv_age
    threshold: 1.5
    diff_from_anchor: true
    # Adjacency-compliant counter: both halves young-side (late teens + early
    # twenties). Average sits at ~19-20, pushing age DOWN when smile tries to
    # drift it older. Satisfies the pair-averaging adjacency rule from iter_07.
    counter:
      label: age_hold_young_adjacent
      pos: "A European {gender} in her late teens, neutral expression."
      neg: "A European {gender} in her early twenties, neutral expression."
    scale_init: 0.2
    scale_step: 0.15
    scale_max: 0.6
