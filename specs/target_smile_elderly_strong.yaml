# Force a non-trivial smile composition on elderly_latin_m:
#  - base filter: dictionary restricted to @elderly_latin_m rows
#  - target values in their natural magnitudes (what we'd want at scale ~1)
#  - very small L1 so the solver prefers non-trivial weights
#  - identity constraint relaxed to accept moderate drift (this base is hard)
intent: smile
base: elderly_latin_m

target:
  siglip_smiling_margin: 0.07
  bs_mouthSmileLeft: 0.8
  bs_mouthSmileRight: 0.8

constraints:
  mv_age:               {"abs<=": 8.0}
  identity_cos_to_base: {">=": -0.65}

solver:
  lambda_l1: 0.001
  max_pairs: 2
  scale_cap: 1.0
